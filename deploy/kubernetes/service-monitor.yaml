apiVersion: v1
kind: Service
metadata:
  name: sub2api-gateway
  labels:
    app: sub2api-gateway
spec:
  selector:
    app: sub2api-gateway
  ports:
    - name: go-http
      port: 8080
      targetPort: 8080
    - name: edge-http
      port: 18080
      targetPort: 18080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sub2api-gateway
  labels:
    app: sub2api-gateway
spec:
  selector:
    matchLabels:
      app: sub2api-gateway
  endpoints:
    - port: go-http
      path: /metrics
      interval: 15s
    - port: edge-http
      path: /metrics
      interval: 15s
